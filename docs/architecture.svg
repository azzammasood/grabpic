<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" width="920" height="480">
  <title>Grabpic system architecture</title>
  <desc>FastAPI, DeepFace, PostgreSQL, and storage volume relationships</desc>
  <defs>
    <style type="text/css"><![CDATA[
      .bg { fill: #ffffff; }
      .box { fill: #f8fafc; stroke: #1e293b; stroke-width: 1.5; rx: 8; }
      .box-accent { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.5; rx: 8; }
      .box-db { fill: #f0fdf4; stroke: #15803d; stroke-width: 1.5; rx: 8; }
      .box-store { fill: #fffbeb; stroke: #b45309; stroke-width: 1.5; rx: 8; }
      .title { font-family: system-ui, Segoe UI, sans-serif; font-size: 15px; font-weight: 700; fill: #0f172a; }
      .lbl { font-family: system-ui, Segoe UI, sans-serif; font-size: 12px; fill: #334155; }
      .small { font-family: system-ui, Segoe UI, sans-serif; font-size: 10px; fill: #64748b; }
      .arrow { stroke: #475569; stroke-width: 1.8; fill: none; marker-end: url(#m); }
      .arrow-dashed { stroke: #64748b; stroke-width: 1.4; fill: none; stroke-dasharray: 5 4; marker-end: url(#m2); }
    ]]></style>
    <marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#475569"/>
    </marker>
    <marker id="m2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#64748b"/>
    </marker>
  </defs>
  <rect class="bg" width="920" height="480" rx="0"/>
  <text x="460" y="36" text-anchor="middle" class="title" font-size="18">Grabpic  system architecture</text>
  <text x="460" y="56" text-anchor="middle" class="small">Identity &amp; retrieval backend (FastAPI ť DeepFace ť PostgreSQL)</text>

  <!-- Storage -->
  <rect class="box-store" x="40" y="100" width="160" height="100" rx="8" ry="8"/>
  <text x="120" y="128" text-anchor="middle" class="title" font-size="13">Storage volume</text>
  <text x="120" y="152" text-anchor="middle" class="lbl">./storage (host mount)</text>
  <text x="120" y="172" text-anchor="middle" class="small">RAW images ť crawl / upload</text>

  <!-- API -->
  <rect class="box-accent" x="260" y="88" width="400" height="124" rx="8" ry="8"/>
  <text x="460" y="118" text-anchor="middle" class="title" font-size="14">API container  Uvicorn / FastAPI</text>
  <text x="290" y="142" class="lbl">POST /v1/ingest/crawl</text>
  <text x="290" y="160" class="lbl">POST /v1/ingest/image</text>
  <text x="460" y="142" class="lbl">POST /v1/auth/selfie</text>
  <text x="460" y="160" class="lbl">GET /v1/me/images ť /grabs/&/images</text>
  <text x="290" y="186" class="small">Ingestion &amp; face pipeline</text>
  <text x="460" y="186" class="small">Bearer grab_id authorization</text>

  <!-- DeepFace -->
  <rect class="box" x="300" y="248" width="320" height="88" rx="8" ry="8"/>
  <text x="460" y="278" text-anchor="middle" class="title" font-size="13">DeepFace (lazy load)</text>
  <text x="460" y="300" text-anchor="middle" class="lbl">Facenet512 embeddings ť cosine match vs threshold</text>
  <text x="460" y="320" text-anchor="middle" class="small">TensorFlow / tf-keras ť RetinaFace (fallback OpenCV)</text>

  <!-- PostgreSQL -->
  <rect class="box-db" x="720" y="100" width="160" height="220" rx="8" ry="8"/>
  <text x="800" y="130" text-anchor="middle" class="title" font-size="13">PostgreSQL</text>
  <text x="800" y="156" text-anchor="middle" class="lbl">grab_subjects</text>
  <text x="800" y="176" text-anchor="middle" class="small">grab_id ť face_encoding[]</text>
  <text x="800" y="204" text-anchor="middle" class="lbl">stored_images</text>
  <text x="800" y="224" text-anchor="middle" class="small">path ť file_hash</text>
  <text x="800" y="252" text-anchor="middle" class="lbl">image_grab_map</text>
  <text x="800" y="272" text-anchor="middle" class="small">image_id ť grab_id (M:N)</text>

  <!-- Client -->
  <rect class="box" x="380" y="380" width="160" height="64" rx="8" ry="8"/>
  <text x="460" y="408" text-anchor="middle" class="title" font-size="12">Clients</text>
  <text x="460" y="428" text-anchor="middle" class="small">Swagger ť curl ť Postman</text>

  <!-- Arrows -->
  <path class="arrow" d="M 200 150 L 255 150"/>
  <path class="arrow" d="M 660 150 L 715 150"/>
  <path class="arrow" d="M 460 212 L 460 245"/>
  <path class="arrow" d="M 460 336 L 460 378"/>
  <path class="arrow-dashed" d="M 380 412 L 300 412 L 300 212"/>
  <text x="240" y="142" class="small">read files</text>
  <text x="620" y="142" class="small">persist</text>
  <text x="472" y="232" class="small">embed</text>
  <text x="472" y="360" class="small">HTTP</text>
</svg>
